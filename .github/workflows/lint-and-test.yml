name: Lint and Test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"] # TODO see https://github.com/mitre-attack/mitreattack-python/issues/176
    steps:
      - uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check --output-format github

      - name: Check formatting with ruff
        run: uv run ruff format --check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"] # TODO see https://github.com/mitre-attack/mitreattack-python/issues/176
    steps:
      - uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Warm ATT&CK STIX cache
        run: uv run --extra dev pytest --prepare-attack-stix-cache -q tests/test_stix20.py::TestCustomAttackObjects::test_matrix

      - name: Run pytest
        run: uv run --extra dev pytest -n 2 --require-attack-stix-cache --cov=mitreattack
